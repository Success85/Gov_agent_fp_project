services:
  db:
    image: postgres:16-alpine
    container_name: gov_agent_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: gov_agent
      POSTGRES_USER: gov_agent
      POSTGRES_PASSWORD: gov_agent
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gov_agent -d gov_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    build:
      context: ./backend
    container_name: gov_agent_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: Gov Agent
      ENVIRONMENT: development
      DATABASE_URL: postgresql+psycopg://gov_agent:gov_agent@db:5432/gov_agent
      CORS_ORIGINS: '["*"]'
      STORAGE_DIR: /app/storage
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    volumes:
      - ./backend:/app
      - ./storage:/app/storage
      - ./frontend_folder:/app/frontend
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
volumes:
  postgres_data:
